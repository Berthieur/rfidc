{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block page_content %}
<div class="login-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-4">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="card auth-card border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="login-logo mx-auto mb-3">RFID</div>
                            <h2 class="fw-bold mb-2">Connexion</h2>
                            <p class="text-muted mb-0">
                                Accédez à la plateforme de contrôle d’accès
                            </p>
                        </div>

                        <form method="post" action="{{request.url_for('auth.login.index')}}" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label">Adresse e-mail</label>
                                <input
                                    type="email"
                                    class="form-control form-control-lg"
                                    id="email"
                                    name="email"
                                    placeholder="admin@rfid.local"
                                >
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Mot de passe</label>
                                <input
                                    type="password"
                                    class="form-control form-control-lg"
                                    id="password"
                                    name="password"
                                    placeholder="••••••••"
                                >
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Se connecter
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        RFID Door Platform — Administration
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
